<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillCraft To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <div class="logo">
            SkillCraft
        </div>

        <h1>📝 To-Do Web Application</h1>

        <p class="subtitle">
            Organize your daily tasks efficiently.
        </p>

        <div class="input-area">

            <input type="text" id="taskInput" placeholder="Enter your task...">

            <select id="priority">
                <option value="High">🔴 High</option>
                <option value="Medium">🟡 Medium</option>
                <option value="Low">🟢 Low</option>
            </select>

            <input type="date" id="taskDate">

            <input type="time" id="taskTime">

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <div class="search-section">

            <input type="text"
                   id="searchInput"
                   placeholder="🔍 Search Task">

        </div>

        <div class="filter-buttons">

            <button id="allBtn">
                All
            </button>

            <button id="pendingBtn">
                Pending
            </button>

            <button id="completedBtn">
                Completed
            </button>

        </div>

        <div class="task-summary">

            <span>Total: <strong id="totalTasks">0</strong></span>

            <span>Completed: <strong id="completedTasks">0</strong></span>

            <span>Pending: <strong id="pendingTasks">0</strong></span>

        </div>

        <ul id="taskList">

        </ul>

        <div class="bottom-buttons">

            <button id="clearAll">
                🗑 Clear All Tasks
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
